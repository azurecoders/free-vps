name: Deploy to VPS

# This tells GitHub to run this script whenever you push to the "main" branch
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH into VPS and update code
        uses: appleboy/ssh-action@v1
        with:
          debug: true
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          # These are the commands GitHub will run on your server
          script: |
            cd /home/daytona/coding
            git pull origin main
            npm install
            pm2 restart my-app --update-env
            exit 0
